<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paragrafix — Destek</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --border: #2a2a2a;
        --text-primary: #f0f0f0;
        --text-secondary: #888;
        --accent: #6c63ff;
        --accent-hover: #5a52e0;
      }

      body {
        background-color: var(--bg);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 48px 40px;
        max-width: 480px;
        width: 100%;
        text-align: center;
      }

      .app-icon {
        width: 80px;
        height: 80px;
        border-radius: 18px;
        background: linear-gradient(135deg, #6c63ff, #a78bfa);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 36px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -1px;
      }

      h1 {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 10px;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 36px;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin-bottom: 36px;
      }

      .contact-label {
        font-size: 13px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 14px;
      }

      .contact-btn {
        display: inline-block;
        background-color: var(--accent);
        color: #fff;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        padding: 14px 32px;
        border-radius: 12px;
        transition: background-color 0.2s ease;
      }

      .contact-btn:hover {
        background-color: var(--accent-hover);
      }

      .footer {
        margin-top: 40px;
        font-size: 13px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="app-icon">P</div>

      <h1>Paragrafix</h1>
      <p class="subtitle">
        Okuma hızı ve anlama becerinizi geliştiren egzersiz uygulaması.<br />
        Herhangi bir sorunuz için bize ulaşın.
      </p>

      <hr class="divider" />

      <p class="contact-label">Destek &amp; İletişim</p>
      <a
        class="contact-btn"
        href="mailto:paragrafix.app@gmail.com?subject=Paragrafix%20Uygulamas%C4%B1%20-%20Destek"
      >
        E-posta G&ouml;nder
      </a>
    </div>

    <p class="footer">&copy; 2026 Paragrafix. T&uuml;m haklar sakl&iacute;d&iacute;r.</p>
  </body>
</html>
